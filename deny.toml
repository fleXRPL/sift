# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check advisories

[advisories]
# Vulnerability database to query
db-urls = ["https://github.com/rustsec/advisory-db"]
db-path = "~/.cargo/advisory-db"
version = 2

# Advisories that cannot be resolved at the project level because they are
# locked by upstream dependencies in the tauri ecosystem.
ignore = [
    # glib::VariantStrIter unsoundness (Moderate)
    # Locked by: tauri (tray-icon feature) -> tray-icon v0.21.3 -> libappindicator
    #            -> gtk v0.18.x -> atk v0.18.x -> glib v0.18.5 (Linux-only)
    # Fix: Requires tauri ecosystem to upgrade gtk-rs to 0.19+. Our code does
    # not use glib::VariantStrIter directly. Track upstream at:
    # https://github.com/tauri-apps/tao/issues
    { id = "RUSTSEC-2024-0403", reason = "Linux-only transitive dep locked by tauri tray-icon chain. Does not affect macOS/Windows builds. glib::VariantStrIter not used directly. Awaiting upstream tauri/gtk-rs 0.19+ migration." },

    # rand::rng() unsoundness with custom logger (Low)
    # The vulnerability affects rand >= 0.9.0 < 0.9.1 only (rand::rng() was
    # introduced in 0.9). Our rand 0.9.2 is already patched. The rand 0.7.3
    # instance is locked by: tauri-utils -> kuchikiki -> selectors v0.24.0
    # -> phf_codegen v0.8.0 -> phf_generator v0.8.0 -> rand ^0.7 (build-time only,
    # rand::rng() does not exist in 0.7.x, so the advisory does not apply).
    { id = "RUSTSEC-2025-0009", reason = "rand 0.7.3 is a build-time-only transitive dep via tauri-utils/phf_codegen that predates rand::rng() (introduced in 0.9). Not exploitable in 0.7.x. rand 0.9.2 already includes the fix (patched in 0.9.1)." },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "LGPL-2.1",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
